spec_version: 1
name: Algorithm_Architects_Email_RL
type: space
runtime: fastapi
app: server.app:app
port: 8000

description: >
  A real-world email triage environment where AI agents learn to prioritize,
  categorize, and route business emails for a B2B SaaS company.
  Features phishing detection, cross-email dependency tracking,
  dynamic escalation consequences, action orchestration, and threat assessment.

tags:
  - openenv
  - email-triage
  - classification
  - routing
  - phishing-detection
  - real-world

tasks:
  - id: spam-detection
    difficulty: easy
    max_steps: 10
    grader:
      type: llm
      prompt_template: "Score the spam detection accuracy from 0.0 to 1.0"

  - id: priority-classification
    difficulty: medium
    max_steps: 10
    grader:
      type: llm
      prompt_template: "Score the priority classification accuracy from 0.0 to 1.0"

  - id: full-triage
    difficulty: hard
    max_steps: 10
    grader:
      type: llm
      prompt_template: "Score the full triage accuracy across priority, category, and route from 0.0 to 1.0"

  - id: critical-escalation
    difficulty: hard
    max_steps: 10
    grader:
      type: llm
      prompt_template: "Score the critical escalation detection accuracy from 0.0 to 1.0"

  - id: action-orchestrator
    difficulty: hard
    max_steps: 10
    grader:
      type: llm
      prompt_template: "Score the action plan quality including systems, SLA, stakeholders from 0.0 to 1.0"

  - id: threat-assessment
    difficulty: hard
    max_steps: 10
    grader:
      type: llm
      prompt_template: "Score the threat assessment quality including threat type, indicators, risk score from 0.0 to 1.0"